name: Release

# Pushing a v* tag lints, tests, builds the assets, attests build
# provenance (Sigstore, via GitHub's OIDC identity) and publishes the
# GitHub release. Verify a download with:
#   gh attestation verify usb-creator --repo Reventlow/usb-creator
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lint
        run: bash -n usb-creator && shellcheck -x usb-creator

      - name: Test
        run: bash tests/test.sh

      - name: Build release assets
        run: |
          sha256sum usb-creator > SHA256SUMS
          scripts/gen-sbom.sh > usb-creator.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            usb-creator
            SHA256SUMS
            usb-creator.spdx.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "usb-creator $GITHUB_REF_NAME" \
            --generate-notes \
            usb-creator SHA256SUMS usb-creator.spdx.json
