name: Upstream watch

# The resolvers scrape live distro infrastructure; this catches upstream
# layout changes (renamed files, moved checksums, rotated keys) before a
# user does. Weekly, and on demand.
on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  resolvers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve every distro against live upstream
        id: sweep
        run: |
          fail=0
          : > /tmp/report.txt
          for d in ubuntu debian fedora arch mint opensuse alpine popos \
                   endeavouros bazzite cachyos kali omarchy zimaos freebsd \
                   openbsd netbootxyz; do
            if ./usb-creator info "$d" >/dev/null 2>&1; then
              echo "PASS $d" | tee -a /tmp/report.txt
            else
              echo "FAIL $d" | tee -a /tmp/report.txt
              ./usb-creator info "$d" 2>&1 | tail -3 || true
              fail=1
            fi
          done
          echo "fail=$fail" >> "$GITHUB_OUTPUT"

      # The weekly report lands as a comment on issue #1 on green weeks
      # too, so a missing Monday comment is itself a signal. GitHub's
      # notification mail delivers it to the maintainer's inbox.
      - name: Post report to issue 1
        if: always() && steps.sweep.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total=$(wc -l < /tmp/report.txt)
          pass=$(grep -c '^PASS' /tmp/report.txt || true)
          {
            echo "**${pass}/${total} PASS** — $(date -u +%Y-%m-%d) ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))"
            if grep -q '^FAIL' /tmp/report.txt; then
              echo
              grep '^FAIL' /tmp/report.txt
            fi
          } > /tmp/comment.md
          gh issue comment 1 --repo "${{ github.repository }}" --body-file /tmp/comment.md

      - name: Fail the run if any resolver failed
        if: steps.sweep.outputs.fail == '1'
        run: exit 1
